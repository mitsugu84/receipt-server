<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>解析結果</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            color: #222;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 26px;
            margin: 0 0 16px;
        }
        .table-wrap {
            overflow-x: auto;
            margin: 18px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 720px;
        }
        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 10px;
            text-align: left;
            white-space: nowrap;
        }
        th {
            background: #eef4ff;
        }
        .amount {
            text-align: right;
        }
        .btn {
            display: block;
            text-align: center;
            text-decoration: none;
            background: #2563eb;
            color: white;
            font-size: 17px;
            font-weight: 700;
            padding: 15px;
            border-radius: 12px;
            margin-top: 16px;
        }
        .btn.secondary {
            background: #475569;
        }
        .summary {
            background: #f8fafc;
            padding: 14px;
            border-radius: 12px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>解析結果</h1>

        <div class="summary">
            件数：{{ records|length }} 件<br>
            合計：{{ "{:,}".format(records|sum(attribute="amount")) }} 円
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>日付</th>
                    <th>店名</th>
                    <th>金額</th>
                    <th>区分</th>
                    <th>メモ</th>
                    <th>ファイル名</th>
                </tr>
                </thead>
                <tbody>
                {% for r in records %}
                <tr>
                    <td>{{ r.date }}</td>
                    <td>{{ r.shop }}</td>
                    <td class="amount">{{ "{:,}".format(r.amount) }} 円</td>
                    <td>{{ r.category }}</td>
                    <td>{{ r.memo }}</td>
                    <td>{{ r.filename }}</td>
                </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>

        <a class="btn" href="/download/{{ excel_filename }}">Excelをダウンロード</a>
        <a class="btn secondary" href="/">続けてアップロード</a>
    </div>
</div>
</body>
</html>
