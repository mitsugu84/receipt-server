<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>領収書まとめWeb</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            color: #222;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 26px;
            margin: 0 0 8px;
        }
        .lead {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.7;
        }
        .upload-box {
            border: 2px dashed #b8c4d6;
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            background: #fafcff;
            margin-bottom: 20px;
        }
        input[type=file] {
            width: 100%;
            padding: 12px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        button {
            width: 100%;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 17px;
            font-weight: 700;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .notice {
            background: #fff7ed;
            color: #9a3412;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        .small {
            color: #777;
            font-size: 14px;
            margin-top: 12px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>領収書まとめWeb</h1>
        <p class="lead">
            領収書・レシートの写真をアップロードすると、AIが読み取ってExcelにまとめます。
        </p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="notice">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/analyze" method="post" enctype="multipart/form-data">
            <div class="upload-box">
                <input type="file" name="receipts" accept="image/*" multiple required>
                <div class="small">
                    スマホならカメラ撮影・写真選択ができます。<br>
                    jpg / jpeg / png / webp 対応
                </div>
            </div>
            <button type="submit">解析してExcelを作成</button>
        </form>

        <p class="small">
            ※ v1ではログインなし・即時Excelダウンロード方式です。月末自動送信は次段階で追加します。
        </p>
    </div>
</div>
</body>
</html>
